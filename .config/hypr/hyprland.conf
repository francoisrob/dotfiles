source=~/.config/hypr/mocha.conf

monitor=,highrr,auto,1

exec-once=uwsm finalize

general {
    border_size = 1
    gaps_in = 2
    gaps_out = 4
    gaps_workspaces = 10
    col.inactive_border = $surface2
    col.active_border = $mauve
    col.nogroup_border = $red
    col.nogroup_border_active = $red
    layout = dwindle
    no_focus_fallback = false
    resize_on_border = true
    extend_border_grab_area = 15
    hover_icon_on_border = true
    allow_tearing = true
    resize_corner = 0
    snap {
      enabled = true
      window_gap = 15
      monitor_gap = 15
      border_overlap = false
    }
}


decoration {
    rounding = 5
    rounding_power = 2.0
    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0
    dim_inactive = true
    dim_strength = 0.1
    dim_special = 0.5
    dim_around = 1.0
    blur {
        enabled = true
        size = 5
        passes = 2
        ignore_opacity = true
        new_optimizations = true
        xray = false
        noise = 0.0117
        contrast = 0.8916
        brightness = 0.8172
        vibrancy = 0.1696
        vibrancy_darkness = 0.0
        special = true
        popups = true
        popups_ignorealpha = 0.2
        input_methods = false
        input_methods_ignorealpha = 0.2
  }
  shadow {
    enabled = true
    range = 40
    render_power = 4
    color = rgba(000000dd)
    color_inactive = rgba(00000077)
    offset = 0 8
    scale = 0.97
  }
}

animations {
    enabled = true
    bezier = fluent_decel, 0, 0.2, 0.4, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutCubic, 0.33, 1, 0.68, 1
    bezier = easeinoutsine, 0.37, 0, 0.63, 1

    # Windows
    animation = windowsIn, 1, 2.3, easeOutCubic, gnomed # window open
    animation = windowsOut, 1, 3, fluent_decel, gnomed # window close.
    animation = windowsMove, 1, 1.5, easeOutCirc, slide # everything in between, moving, dragging, resizing.

    # Fade
    animation = fadeIn, 1, 0.1, easeOutCubic  # fade in (open) -> layers and windows
    animation = fadeOut, 1, 1.7, easeOutCubic # fade out (close) -> layers and windows
    animation = fadeSwitch, 0, 1, easeOutCirc # fade on changing activewindow and its opacity
    animation = fadeShadow, 1, 10, easeOutCirc # fade on changing activewindow for shadows
    animation = fadeDim, 1, 4, fluent_decel # the easing of the dimming of inactive windows
    animation = border, 1, 2.7, easeOutCirc # for animating the border's color switch speed
    animation = workspaces, 1, 2.3, easeOutCubic, slidefadevert # styles: slide, slidevert, fade, slidefade, slidefadevert
}

input {
    kb_layout = us
    kb_options = caps:swapescape

    kb_rules =
    numlock_by_default = true
    repeat_rate = 30
    repeat_delay = 250
    scroll_method = 2fg
    touchpad {
        natural_scroll = true
        drag_lock = false
        tap-and-drag = true
    }
}

dwindle {
    pseudotile = true # mainMod + P
    smart_split = true
    preserve_split = true
    smart_resizing = true
}

group {
  col.border_inactive = $red
  col.border_active = $yellow $sky $sky $yellow 135deg
  groupbar {
      enabled = true
      font_size = 12
      font_family = Ubuntu
      text_color = $text
      height = 13
      indicator_gap = 4
      indicator_height = 3
      gradients = false
      text_offset = -1
      gaps_in = 0
      gaps_out = 2
      render_titles = true
      col.active = $green
      col.inactive = $surface0
    }
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    disable_autoreload = false
    vrr = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    enable_swallow = true
    focus_on_activate = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
}

xwayland {
    use_nearest_neighbor= true
}

render {
  direct_scanout = 2
  # unload_all_zero_opacity = true
}

cursor {
  inactive_timeout = 5
  no_hardware_cursors = 1
}

ecosystem {
  no_donation_nag = true
}

debug {
  overlay = false
  disable_logs = false
  enable_stdout_logs = false
}


$mainMod = SUPER
bind = $mainMod, Q, exec, uwsm-app -- sh -c 'kitten @ --to unix:/tmp/kitty launch --type=os-window --cwd=current 2>/dev/null || kitty --single-instance --listen-on unix:/tmp/kitty'
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, uwsm stop
bind = $mainMod, E, exec, uwsm-app -- chromium
bind = $mainMod, V, togglefloating, 
bind = $mainMod, L, exec, loginctl lock-session

bind = $mainMod, S, exec, hyprlauncher
bind = $mainMod, A, exec, cliphist list | hyprlauncher --dmenu | cliphist decode | wl-copy

bind = $mainMod, F, fullscreenstate, 2, 0
bind = $mainMod SHIFT, F, fullscreenstate, 0, 2

bind = $mainMod, P, pin
bind = $mainMod, O, pseudo
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, T, togglegroup

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d


bind = $mainMod, Tab, changegroupactive

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, space, togglespecialworkspace
bind = $mainMod, Y, movetoworkspace, special

bind = $mainMod, Print, exec, grimblast --notify copy area
bind = $mainMod SHIFT, Print, exec, grimblast --notify copy output
bind =, XF86Calculator, exec, uwsm-app -- gnome-calculator

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next

binde = , XF86MonBrightnessUp, exec, brightnessctl s 10%+
binde = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

bind = ALT, R, submap, resize
submap = resize
binde = , l, resizeactive, 10 0
binde = , h, resizeactive, -10 0
binde = , k, resizeactive, 0 -10
binde = , j, resizeactive, 0 10
bind = , escape, submap, reset
submap = reset

# float calculator
windowrule = match:class (org.gnome.Calculator), match:title (Calculator), float on, size 400 400

# float nm
windowrule = match:initial_class org.twosheds.iwgtk, match:initial_title iwgtk, float on, size 400 500, center on
# float bluetooth manager
windowrule = match:initial_class .blueman-manager-wrapped, float on, max_size 400 500, center on
# float pavucontrol
windowrule = match:class (org.pulseaudio.pavucontrol), match:title (Volume Control), float on, size 1000 800, center on

# float bitwarden
windowrule = match:initial_class chrome-nngceckbapebfimnlniiiahkandclblb-Default, size 500 600, center on

windowrule = match:initial_class xdg-desktop-portal-gtk, float on, size 600 600, center on

windowrule = match:initial_class chromium-browser, match:initial_title ^Sign in.*, float on, size 500 700

windowrule = match:initial_class ^chrome\-\w*\-Default$, float on

windowrule = match:initial_class (Slack), match:initial_title (Slack – Huddle), float on, size 800 600

# no border on single window
windowrule = match:workspace w[t1], border_size 0

windowrule = match:title (Picture in picture), float off

windowrule = match:pin true, opacity 1 0.7, border_size 0

windowrule = match:class (kitty), match:title (Scratchpad), workspace special

# noshadow on tiled windows (shadows only on floating)
windowrule = no_shadow on, match:float 0

# idleinhibit on fullscreen media
windowrule = idle_inhibit fullscreen, match:class (mpv)
windowrule = idle_inhibit fullscreen, match:initial_class (chromium-browser)

# spotlight effect for calculator
windowrule = dim_around on, match:class (org.gnome.Calculator)

# suppress maximize for all apps
windowrule = suppress_event maximize, match:class (.*)

# Touchpad gestures
gesture = 3, horizontal, workspace

# Layer rules
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.3, match:namespace waybar
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.5, match:namespace swaync-notification-window

# Night light
bind = $mainMod SHIFT, N, exec, hyprsunset -t 4500
bind = $mainMod CTRL, N, exec, pkill hyprsunset

# Workspace overview (hyprexpo)
# bind = $mainMod, grave, hyprexpo:expo, toggle

plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = center current
    }
    dynamic-cursors {
        enabled = true
        mode = tilt
        threshold = 2
        shake {
            enabled = true
            threshold = 6.0
            factor = 2.0
        }
    }
}
