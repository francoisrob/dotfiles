[bar]
background-opacity = 85
scale = 0.72
padding = 0.2
padding-ends = 0.35
module-gap = 0.35
bg = "bg-base"
button-icon-padding = 0.9
button-icon-size = 0.9
button-label-size = 0.95
dropdown-autohide = true
dropdown-freeze-label = false
dropdown-opacity = 98
rounding = "none"
shadow = "none"

[general]
font-sans = "Ubuntu Sans"

[[bar.layout]]
monitor = "*"
left = [{ name = "group", modules = ["dashboard", "clock"] }, "hyprland-workspaces", "cava"]
center = ["window-title"]
right = ["systray", "custom-mongodb", "hyprsunset", { name = "resources", modules = ["cpu", "ram"] }, { name = "connectivity", modules = ["bluetooth", "network"] }, { name = "controls", modules = ["volume", "battery"] }, "notifications"]

[modules.dashboard]
right-click = "wayle panel settings"

[modules.clock]
format = "%H:%M"
border-show = true
dropdown-show-seconds = true
icon-show = false

[modules.hyprland-workspaces]
display-mode = "label"
numbering = "absolute"
min-workspace-count = 2
monitor-specific = false
show-special = false
app-icons-show = true
app-icons-dedupe = false
divider = " "
icon-size = 0.9

[modules.cpu]
format = "{{ percent }}"

[modules.systray]
icon-scale = 0.85
item-gap = 0.4
blacklist = ["*blueman*", "*bluetooth*"]

[modules.window-title]
label-max-length = 60

[modules.bluetooth]
label-show = false

[modules.weather]
location = "Somerset West"
units = "metric"
format = "{{ temp }}{{ temp_unit }}"

[modules.volume]
format = "{{ percent }}%"

[modules.battery]
level-icons = [
    "tb-battery-vertical-symbolic",
    "tb-battery-vertical-1-symbolic",
    "tb-battery-vertical-2-symbolic",
    "tb-battery-vertical-3-symbolic",
    "tb-battery-vertical-4-symbolic",
]
charging-icon = "ld-battery-charging-symbolic"
alert-icon = "tb-alert-triangle-symbolic"
format = "{{ percent }}"

[modules.cava]
bars = 12
button-bg-color = "transparent"
framerate = 15
high-cutoff = 15000
noise-reduction = 0.2

[modules.hyprsunset]
label-show = false

[modules.network]
label-show = false

[modules.notification]
label-show = false
popup-duration = 3000

[[modules.custom]]
id = "backlight"
command = "brightnessctl -m | awk -F, '{print $4}' | tr -d '%'"
interval-ms = 2000
format = "{{ output }}%"
icon-show = true
icon-name = "ld-sun-symbolic"
scroll-up = "brightnessctl s 5%+"
scroll-down = "brightnessctl s 5%-"

[[modules.custom]]
id = "mongodb"
command = "~/.config/waybar/scripts/mongodb-status.sh"
interval-ms = 5000
format = "{{ text }}"
tooltip-format = "{{ tooltip }}"
icon-show = true
icon-name = "ld-leaf-symbolic"
left-click = "sh -c ~/.config/waybar/scripts/mongodb-toggle.sh"

[osd]
border = false
duration = 800
margin = 0.0

[wallpaper]
engine-enabled = true
cycling-enabled = true
cycling-directory = "/home/francois/dotfiles/resources/"
cycling-mode = "sequential"
cycling-interval-mins = 60
cycling-same-image = true

[styling.palette]
bg = "#11111b"
blue = "#74c7ec"
elevated = "#1e1e2e"
fg = "#cdd6f4"
fg-muted = "#bac2de"
green = "#a6e3a1"
primary = "#b4befe"
red = "#f38ba8"
surface = "#181825"
yellow = "#f9e2af"
