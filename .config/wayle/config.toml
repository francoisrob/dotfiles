[bar]
scale = 0.72
padding = 0.2
padding-ends = 0.35
module-gap = 0.35
bg = "bg-base"
rounding = "md"
shadow = "floating"

[[bar.layout]]
monitor = "*"
left = ["dashboard", "clock", "hyprland-workspaces"]
center = ["window-title"]
right = ["systray", "custom-mongodb", "hyprsunset", "cpu", "ram", "bluetooth", "network", "custom-backlight", "volume", "battery", "notifications"]

[modules.dashboard]
right-click = "wayle panel settings"

[modules.clock]
format = "%H:%M"
icon-show = false

[modules.hyprland-workspaces]
display-mode = "label"
numbering = "absolute"
min-workspace-count = 2
monitor-specific = false
show-special = false
app-icons-show = true
app-icons-dedupe = true
divider = " "

[modules.systray]
icon-scale = 0.85
item-gap = 0.4
blacklist = ["*blueman*", "*bluetooth*"]

[modules.window-title]
label-max-length = 60

[modules.bluetooth]
label-show = false

[modules.weather]
location = "Somerset West"
units = "metric"
format = "{{ temp }}{{ temp_unit }}"

[modules.volume]
format = "{{ percent }}%"

[modules.battery]
format = "{{ percent }}%"


[[modules.custom]]
id = "backlight"
command = "brightnessctl -m | awk -F, '{print $4}' | tr -d '%'"
interval-ms = 2000
format = "{{ output }}%"
icon-show = true
icon-name = "ld-sun-symbolic"
scroll-up = "brightnessctl s 5%+"
scroll-down = "brightnessctl s 5%-"

[[modules.custom]]
id = "mongodb"
command = "~/.config/waybar/scripts/mongodb-status.sh"
interval-ms = 5000
format = "{{ text }}"
tooltip-format = "{{ tooltip }}"
icon-show = true
icon-name = "ld-leaf-symbolic"
left-click = "sh -c ~/.config/waybar/scripts/mongodb-toggle.sh"

[wallpaper]
engine-enabled = true
cycling-enabled = true
cycling-directory = "~/dotfiles/resources"
cycling-mode = "sequential"
cycling-interval-mins = 60
cycling-same-image = true

[styling.palette]
bg = "#11111b"
blue = "#74c7ec"
elevated = "#1e1e2e"
fg = "#cdd6f4"
fg-muted = "#bac2de"
green = "#a6e3a1"
primary = "#b4befe"
red = "#f38ba8"
surface = "#181825"
yellow = "#f9e2af"
